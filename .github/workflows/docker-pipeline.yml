name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Code Checkout karo
      uses: actions/checkout@v3

    - name: DockerHub Login karo
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Image Build karo
      run: docker build -t eshanj0908/my-app:v1 .

    - name: DockerHub Pe Push karo
      run: docker push eshanj0908/my-app:v1
